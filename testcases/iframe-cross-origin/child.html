<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>iframe-cross-origin — Child</title>
</head>
<body>
  <h2>Cross-Origin Iframe Content</h2>
  <button id="child-btn">Click XO Button</button>
  <p id="child-status">idle</p>

  <script>
    document.getElementById("child-btn").addEventListener("click", () => {
      document.getElementById("child-status").textContent = "xo-clicked";
      window.parent.postMessage({ type: "child-clicked", text: "xo-clicked" }, "*");
    });
  </script>
</body>
</html>
