<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>iframe-oauth-mock — Parent</title>
</head>
<body>
  <h1>App</h1>
  <p id="login-status">not logged in</p>
  <button id="login-btn">Login with Google</button>

  <div id="oauth-container" style="display:none;">
    <iframe
      id="oauth-frame"
      src="http://localhost:9292/testcases/iframe-oauth-mock/oauth-child.html"
      style="width:400px;height:300px;border:1px solid #4285f4;"
    ></iframe>
  </div>

  <script>
    const loginBtn = document.getElementById("login-btn");
    const container = document.getElementById("oauth-container");
    const status = document.getElementById("login-status");

    loginBtn.addEventListener("click", () => {
      container.style.display = "block";
    });

    window.addEventListener("message", (e) => {
      if (e.data && e.data.type === "oauth-done") {
        container.style.display = "none";
        status.textContent = "logged in: " + e.data.email;
      }
    });
  </script>
</body>
</html>
