[target.wasm32-unknown-unknown]
rustflags = '-C link-arg=--allow-undefined --cfg getrandom_backend="wasm_js"'

# We target wasm32-unknown-unknown (OS-less) for wasm-bindgen --target web.
# rquickjs-sys needs a libc to compile QuickJS's C; build.js sets CC/CFLAGS
# pointing at wasi-libc (Homebrew on macOS, wasi-sdk on Linux CI), with
# -D__wasi__ to satisfy wasi-libc's header guard on the unknown-unknown target.
# CC/CFLAGS are machine-specific and live in scripts/build.js, not here.