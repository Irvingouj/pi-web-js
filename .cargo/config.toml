[target.wasm32-wasip1]
rustflags = '-C link-arg=--allow-undefined'

# We target wasm32-wasip1 (not wasm32-unknown-unknown) because rquickjs-sys
# ships pre-generated FFI bindings only for the wasi targets, and the wasi
# target has a real libc sysroot (wasi-sdk) so QuickJS's C compiles cleanly.
# wasm-bindgen consumes the .wasm identically regardless of which wasm32-* target.
#
# CC/CFLAGS for the C compile are machine-specific (Homebrew on macOS, wasi-sdk
# on Linux CI) and are set by scripts/build.js, not here.