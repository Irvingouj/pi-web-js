name: Release

# Publishes @pi-oxide/* npm packages with provenance. Two tag prefixes:
#   extension-js-vX.Y.Z        → @pi-oxide/extension-js
#   dom-semantic-tree-vX.Y.Z   → @pi-oxide/dom-semantic-tree
# The tag version MUST match the publish manifest version.
#
# Safety gates (in order):
#   1. Tag must be reachable from origin/main (not just any branch/HEAD).
#   2. CI workflow must have passed on the exact tagged commit (ci.yml is
#      configured to run on release tags, so a status will exist).
#   3. Tag version must match npm-package.json / package.json source version.
#   4. WASM built with cargo --release (optimized bundle ships to npm).
#
# Provenance: OIDC, no long-lived npm token. Requires the package to be linked
# to this repo (Irvingouj/pi-web-js) under npm → Settings → publishing access.
# Until linked, `npm publish --provenance` fails loudly.

on:
  push:
    tags:
      - "extension-js-v*"
      - "dom-semantic-tree-v*"

permissions:
  contents: write
  id-token: write  # npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history + main ref so we can verify the tag is on main
          # and so merge-base ancestry checks work.
          fetch-depth: 0

      # Issue: release tags can be pushed from any branch / detached HEAD.
      # Only tags reachable from origin/main should publish. A tag pushed from
      # a feature branch or a stale main must fail fast.
      - name: Verify tag is on main
        run: |
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor '${{ github.sha }}' origin/main; then
            echo "::error::tag ${{ github.ref_name }} (commit ${{ github.sha }}) is not reachable from origin/main"
            echo "Release tags must point at a commit on main."
            exit 1
          fi
          echo "✓ ${{ github.ref_name }} is on main"

      # Issue: release.yml runs independently of ci.yml. Without a gate, a tag
      # pushed on a red-main commit would still publish. Require a successful
      # CI run on the EXACT tagged commit before proceeding. ci.yml is
      # configured to also trigger on release tags, so a status will exist.
      - name: Require green CI on tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha='${{ github.sha }}'
          echo "Waiting for CI workflow run on commit $sha ..."
          # CI may still be queued/running when the tag push lands. Poll up to
          # ~10 minutes, then fail loudly if no completed CI run is found.
          for i in $(seq 1 60); do
            conclusion=$(gh run list \
              --workflow=ci.yml \
              --commit="$sha" \
              --status=completed \
              --limit=1 \
              --json conclusion,status \
              --jq '.[0].conclusion // empty')
            if [ -n "$conclusion" ]; then
              break
            fi
            echo "  ($i) CI not yet complete; sleeping 10s ..."
            sleep 10
          done
          if [ -z "$conclusion" ]; then
            echo "::error::No completed CI run found for $sha after ~10 minutes."
            echo "Ensure ci.yml triggers on release tags (it must, to gate releases)."
            exit 1
          fi
          if [ "$conclusion" != "success" ]; then
            echo "::error::CI on $sha concluded with '$conclusion'. Refusing to publish."
            echo "Fix CI on main and re-tag, or roll back the tag."
            exit 1
          fi
          echo "✓ CI green on $sha"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # rquickjs-sys compiles QuickJS C, which needs a libc for wasm32-unknown-unknown.
      # build.js detects wasi-sdk under /opt and sets CC/CFLAGS; just install it.
      - name: Install wasi-sdk (libc sysroot for the WASM build)
        run: |
          curl -sSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz -o /tmp/wasi-sdk.tar.gz
          tar -xzf /tmp/wasi-sdk.tar.gz -C /opt/
      - name: Install libclang (for rquickjs bindgen feature)
        run: |
          sudo apt-get update && sudo apt-get install -y libclang-dev
          echo "LIBCLANG_PATH=$(dirname $(find /usr/lib/llvm-*/lib/libclang.so | head -1))" >> "$GITHUB_ENV"
      - name: Install wasm-bindgen-cli (matched to Cargo.lock)
        run: |
          npm install -g npm@latest
          node --version
          npm --version
          wb_version=$(grep -A1 '^name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cargo install wasm-bindgen-cli --version "$wb_version" --locked
      - name: Resolve target from tag
        id: target
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          case "$tag" in
            extension-js-v*)
              echo "name=extension-js" >> "$GITHUB_OUTPUT"
              echo "version=${tag#extension-js-v}" >> "$GITHUB_OUTPUT" ;;
            dom-semantic-tree-v*)
              echo "name=dom-semantic-tree" >> "$GITHUB_OUTPUT"
              echo "version=${tag#dom-semantic-tree-v}" >> "$GITHUB_OUTPUT" ;;
            *) echo "unknown tag prefix: $tag"; exit 1 ;;
          esac

      - name: Verify tag matches source version
        run: |
          tag_version="${{ steps.target.outputs.version }}"
          case "${{ steps.target.outputs.name }}" in
            extension-js)
              src_version=$(node -p "require('./crates/extension-js/js/npm-package.json').version") ;;
            dom-semantic-tree)
              src_version=$(node -p "require('./crates/dom-semantic-tree/js/package.json').version") ;;
          esac
          if [ "$tag_version" != "$src_version" ]; then
            echo "tag ($tag_version) ≠ source ($src_version)"
            exit 1
          fi

      # extension-js: WASM (Rust → wasm-bindgen, release profile) + TS bundle
      # (vite) → pkg/*.js. vite emits JS + .d.ts into pkg/ but NOT package.json
      # — stage it from npm-package.json (mirrors scripts/publish-npm.js).
      # build.js sets CC/CFLAGS. --release produces the optimized WASM bundle
      # (smaller + faster than debug); this is what ships to npm consumers.
      - name: Build extension-js
        if: steps.target.outputs.name == 'extension-js'
        run: |
          cd crates/extension-js/js && npm ci
          cd "$GITHUB_WORKSPACE" && node scripts/build.js extension --release
          cd crates/extension-js/js && npm run build
          node -e "const fs=require('fs');const m=require('./npm-package.json');delete m.sideEffects;fs.writeFileSync('pkg/package.json',JSON.stringify(m,null,'\t')+'\n')"
          node -e "const fs=require('fs');const m=require('./npm-package.json');const miss=(m.files||[]).filter(f=>f.includes('*')?!fs.readdirSync('pkg').some(e=>e.endsWith(f.slice(1))):!fs.existsSync('pkg/'+f));if(miss.length){console.error('Missing:',miss);process.exit(1)}"

      # dom-semantic-tree: WASM (release profile) + TS (tsc) → dist/ + package.json
      # already in place
      - name: Build dom-semantic-tree
        if: steps.target.outputs.name == 'dom-semantic-tree'
        run: |
          node scripts/build.js dom --release
          cd crates/dom-semantic-tree/js && npm ci && npm run build
          test -f dist/index.js || { echo "dist/index.js missing after build"; exit 1; }

      - name: Publish with provenance
        run: |
          case "${{ steps.target.outputs.name }}" in
            extension-js)        cd crates/extension-js/js/pkg ;;
            dom-semantic-tree)   cd crates/dom-semantic-tree/js ;;
          esac
          npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
