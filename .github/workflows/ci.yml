name: CI

on:
  push:
    branches: [main]
    # Also run on release tags so release.yml can require a green CI run on
    # the exact tagged commit (see release.yml's verify-ci gate). Without this,
    # release tags have no CI status to gate against.
    tags:
      - "extension-js-v*"
      - "dom-semantic-tree-v*"
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      # Clippy is advisory: the codebase has pre-existing design lints
      # (result_large_err on CellError) that need a refactor, not a quick fix.
      # Show warnings but don't fail CI on them.
      - name: Clippy (advisory)
        run: cargo clippy --workspace --lib --tests || true
      # web-js crate is wasm-only (playground); test the host-runnable crates.
      # Matches the README's test commands.
      - name: Core lib tests
        run: |
          cargo test -p web-js-core --lib
          cargo test -p extension-js --lib
          cargo test -p dom-semantic-tree --lib
          cargo test -p web-fs --lib
          cargo test -p web-js-base --lib

  extension-js-unit:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # rquickjs-sys compiles QuickJS C, which needs a libc for wasm32-unknown-unknown.
      # build.js detects Homebrew (macOS) or wasi-sdk (Linux CI) and sets CC/CFLAGS +
      # LIBCLANG_PATH/BINDGEN_EXTRA_CLANG_ARGS (rquickjs's `bindgen` feature generates
      # FFI bindings at build time since the published crate omits the wasm32-unknown-
      # unknown pre-generated file). We just install wasi-sdk to /opt where build.js
      # looks for it.
      - name: Install wasi-sdk (libc sysroot + libclang for bindgen)
        run: |
          curl -sSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz -o /tmp/wasi-sdk.tar.gz
          tar -xzf /tmp/wasi-sdk.tar.gz -C /opt/
      - name: Install libclang (for rquickjs bindgen feature)
        run: |
          sudo apt-get update && sudo apt-get install -y libclang-dev
          echo "LIBCLANG_PATH=$(dirname $(find /usr/lib/llvm-*/lib/libclang.so | head -1))" >> "$GITHUB_ENV"
      - name: Install wasm-bindgen-cli (matched to Cargo.lock)
        run: |
          wb_version=$(grep -A1 '^name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cargo install wasm-bindgen-cli --version "$wb_version" --locked
      - name: Install extension-js JS deps (for tsc @types/chrome + vitest)
        working-directory: crates/extension-js/js
        run: npm ci
      - name: Build extension WASM
        run: node scripts/build.js extension --release
      - name: extension-js unit tests
        working-directory: crates/extension-js/js
        run: |
          npm run build
          npx vitest run
